site_name: Yatsu Reader Docs
site_description: Documentation for Yatsu Reader, a web-based ebook reader for Japanese learners.
site_url: https://docs.yatsu.moe/

nav:
  - Start Here:
      - Home: index.md
      - Using the Reader: reader.md
      - Using the Library: library.md
      - Yatsu Accounts and Settings Sync: yatsu-accounts.md
      - Using Yatsu Offline: offline.md
  - Reading and Languages:
      - Reading Tracking: reading-tracking.md
      - Chinese Support: chinese-support.md
      - Korean Support: korean-support.md
  - Sync, Storage, and Data:
      - Google Drive Sync: google-drive-sync.md
      - Storage Source Security: storage-source-security.md
      - Statistics and Sync: statistics-and-sync.md
      - Migrating from Ttsu to Yatsu: migrating-from-ttsu.md
      - Recovering Old GitHub Pages Data: github-pages-recovery.md
      - Compatibility with Ttsu: ttsu-compatibility.md
  - Integrations:
      - Using Yatsu with Jiten Reader: jiten-reader.md
      - Yatsu Whispersync: ttu-whispersync.md
      - Discord Rich Presence: discord-rich-presence.md
  - Support:
      - Frequently Asked Questions: faq.md
      - How to Report Bugs: how-to-report-bugs.md
  - Advantages of Yatsu over Ttsu: why-yatsu.md

not_in_nav: |
  webdav-sync.md
  webdav-windows.md

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/yatsu-mark.svg
  favicon: assets/ya.svg
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-auto
        name: Switch to light theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Use system theme
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - privacy:
      enabled: !ENV [CI, false]

extra:
  social:
    - icon: material/open-in-new
      link: https://app.yatsu.moe
      name: Open Yatsu Reader

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/image-links.js

copyright: Copyright © Yatsu Reader
