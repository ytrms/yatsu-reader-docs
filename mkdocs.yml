site_name: Yatsu Reader Docs
site_description: Documentation for Yatsu Reader, a web-based ebook reader for Japanese learners.
site_url: https://docs.yatsu.moe/

nav:
  - Home: index.md
  - Using the Reader: reader.md
  - Setting up Drive Sync: google-drive-sync.md
  - Reading Tracking: reading-tracking.md
  - Using Yatsu Offline: offline.md
  - Compatibility with Ttsu: upstream-compatibility.md
  - Frequently Asked Questions: faq.md
  - How to Report Bugs: how-to-report-bugs.md

theme:
  name: material
  custom_dir: overrides
  language: en
  logo: assets/yatsu-mark.svg
  favicon: assets/ya.svg
  font:
    text: Noto Sans JP
    code: JetBrains Mono
  palette:
    scheme: default
    primary: blue
    accent: blue
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - privacy:
      enabled: !ENV [CI, false]

extra:
  social:
    - icon: material/open-in-new
      link: https://app.yatsu.moe
      name: Open Yatsu Reader

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

copyright: Copyright © Yatsu Reader
